<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Palette</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Auth section (shown when not logged in) -->
    <div id="auth-section" class="auth-section hidden">
      <div class="auth-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/>
          <path d="M14 20h12M20 14v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h2 class="auth-title">Connect to Margin</h2>
      <p class="auth-desc">Sign in to sync your projects and time tracking.</p>
      <button id="sign-in-btn" class="btn btn-primary btn-full">Sign in with Google</button>
      <div class="settings-row">
        <label class="settings-label" for="api-base-input">Server URL</label>
        <input type="text" id="api-base-input" class="settings-input" placeholder="http://localhost:4001" spellcheck="false">
      </div>
    </div>

    <!-- Main section (shown when logged in) -->
    <div id="main-section" class="hidden">
      <header class="popup-header">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar"></div>
          <div class="user-details">
            <span class="user-name" id="user-name"></span>
            <span class="connection-status" id="connection-status">Connected</span>
          </div>
        </div>
        <div class="header-actions">
          <button id="auto-match-btn" class="btn btn-secondary btn-auto-color" title="Auto-match events by title">
            Auto Color
          </button>
          <button id="sign-out-btn" class="icon-btn" title="Sign out">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M7 3H4a1 1 0 00-1 1v10a1 1 0 001 1h3M11 13l4-4-4-4M15 9H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="section-label">Projects</div>

      <!-- Project List (read-only) -->
      <div id="project-list" class="project-list">
        <div id="empty-state" class="empty-state">
          <p>No projects yet.</p>
          <p class="hint">Create projects in the Margin app, then right-click events in Google Calendar to assign them.</p>
        </div>
        <div id="loading-state" class="empty-state hidden">
          <p>Loading projects...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
